<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARKOP SELSU & ZAMORE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f5f6fa;display:flex;color:#222;}

.sidebar{
width:240px;background:#fff;height:100vh;
padding:20px;border-right:1px solid #eee;
position:fixed;
}

.logo{
font-size:26px;font-weight:bold;
color:#e63946;margin-bottom:30px;
}

.menu button{
display:block;width:100%;margin-bottom:10px;
padding:12px;border:none;border-radius:10px;
background:#f1f1f1;cursor:pointer;
}

.menu button.active{
background:#e63946;color:white;
}

.main{
margin-left:260px;padding:20px;width:100%;
}

.topbar{
display:flex;justify-content:space-between;
margin-bottom:20px;flex-wrap:wrap;gap:10px;
}

.filter{
display:flex;gap:10px;flex-wrap:wrap;
}

.filter button,
.filter input{
padding:10px 14px;border:none;
border-radius:10px;cursor:pointer;
background:#fff;border:1px solid #ddd;
}

.filter button.active{
background:#e63946;color:white;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;margin-bottom:20px;
}

.card{
padding:20px;border-radius:18px;color:white;
}

.card h3{font-size:14px;margin-bottom:8px;}
.card h1{font-size:24px;}

.red{background:linear-gradient(45deg,#ef4444,#dc2626);}
.dark{background:linear-gradient(45deg,#222,#444);}
.green{background:linear-gradient(45deg,#10b981,#059669);}
.blue{background:linear-gradient(45deg,#06b6d4,#0ea5e9);}

.chart-box{
background:white;padding:20px;border-radius:20px;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">WARKOP SELSU & ZAMORE</div>

<div class="menu">
<button class="active">Dashboard</button>
<button onclick="location.href='kasir.html'">Kasir</button>
<button onclick="location.href='laporan.html'">Laporan</button>
</div>
</div>

<div class="main">

<div class="topbar">
<h2>Dashboard</h2>

<div class="filter">
<button onclick="setFilter('daily')" id="btnDaily" class="active">Daily</button>
<button onclick="setFilter('weekly')" id="btnWeekly">Weekly</button>
<button onclick="setFilter('monthly')" id="btnMonthly">Monthly</button>

<input type="date" onchange="filterTanggal(this.value)">
<button onclick="resetFilter()">Reset</button>
</div>
</div>

<div class="cards">

<div class="card red">
<h3>Pendapatan</h3>
<h1 id="omzet">Rp0</h1>
</div>

<div class="card dark">
<h3>Total Transaksi</h3>
<h1 id="trx">0</h1>
</div>

<div class="card green">
<h3>Laba Bersih</h3>
<h1 id="profit">Rp0</h1>
</div>

<div class="card blue">
<h3>Total Item</h3>
<h1 id="item">0</h1>
</div>

</div>

<div class="chart-box">
<h3>Trend Omzet vs Laba</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyB0_f8z2BV5szaA3tnEmwAD9UqjdU0A5d8TAVg-SuXTIoiGH7Y4yzfa99roTzpYS81/exec";

let transaksi = [];
let currentFilter = 'daily';
let selectedDate = null;
let chart;

// 🔥 FULL MENU DATA (LENGKAP)
const menuData = {
"Nasi Telor Crispy":[6500,12000],
"Nasi Goreng Kampung":[7500,15000],
"Nasi Goreng Kecap":[7500,15000],
"Rice Bowl":[8500,15000],
"Snack Platter":[8500,15000],
"Mie Nyemek Bangladesh":[9000,15000],
"Mie Nyemek Jogja":[9000,15000],
"Mie Rebus Telor":[6500,12000],
"Mie Goreng Telor":[6500,12000],
"Kentang Goreng":[5000,10000],
"Bakso Goreng":[5000,10000],
"Cireng Rujak":[4500,10000],
"Mini Bakpao":[3500,10000],
"Roti Bakar Coklat":[5500,10000],
"Roti Bakar Keju":[5500,10000],
"Roti Bakar Coklat Keju":[5500,10000],
"Otak - Otak":[3000,10000],
"Nasi":[2000,4000],
"Air Mineral":[1500,5000],
"Good Day Freeze":[3000,7000],
"Good Day Cappucino":[3000,7000],
"ABC Klepon":[3000,7000],
"Bonteh Teh Tarik":[3000,7000],
"Bonteh Matcha":[3000,7000],
"Chocolatos Coklat":[3000,8000],
"Chocolatos Matcha":[3000,8000],
"Drink Beng Beng":[3000,8000],
"Hilo Banana":[2500,8000],
"Hilo Hazelnut":[2500,8000],
"Nutrisari Jeruk":[2000,6000],
"Nutrisari Leci":[2000,6000],
"Josu":[2500,6000],
"Luwak":[2000,7000],
"Indocafe":[2000,7000],
"Creamy Latte":[2000,7000],
"Nescafe":[2000,6000],
"Susu Coklat":[2500,7000],
"Susu Putih":[2500,7000],
"Kapal Api (Hot)":[2500,5000],
"ABC Susu":[2500,5000],
"Minuman All (Hot)":[2500,5000],
"Pisang Nugget isi 4":[5500,10000],
"Pisang Nugget isi 6":[8500,15000],
"Basic Cookies":[1500,5000],
"Cookies Cadbury":[5000,10000],
"Cookies S'Mores":[5000,10000],
"Cookies Cheese":[5000,10000],
"Lotus Biscoff":[7000,12000],
"Brownbites":[8500,15000],
"Brownies Lumer":[8500,15000],
"Brownies Chruncy":[8500,15000],
"Brownies Cream Cheese":[10000,15000],
"Dessert Platter":[10000,15000]
};

function rupiah(n){
return 'Rp' + Number(n).toLocaleString('id-ID');
}

// 🔥 FIX TIMEZONE
function toLocalDate(d){
return new Date(d).toLocaleDateString('id-ID');
}

// FILTER
function setFilter(f){
selectedDate = null;
currentFilter = f;

document.querySelectorAll('.filter button')
.forEach(b=>b.classList.remove('active'));

document.getElementById(
f==='daily'?'btnDaily':
f==='weekly'?'btnWeekly':'btnMonthly'
).classList.add('active');

render();
}

function filterTanggal(d){
selectedDate = d;
render();
}

function resetFilter(){
selectedDate=null;
render();
}

function getFiltered(){

if(selectedDate){
return transaksi.filter(t=>{
return new Date(t.tanggal)
.toISOString().split('T')[0] === selectedDate;
});
}

const now = new Date();

return transaksi.filter(t=>{
const d = new Date(t.tanggal);

if(currentFilter==='daily'){
return toLocalDate(d) === toLocalDate(now);
}

if(currentFilter==='weekly'){
let w = new Date();
w.setDate(now.getDate()-7);
return d >= w;
}

if(currentFilter==='monthly'){
return d.getMonth() === now.getMonth();
}
});
}

// RENDER
function render(){

const data = getFiltered();

let omzet=0, item=0, profit=0;
const grafikOmzet={}, grafikProfit={};

data.forEach(trx=>{

const qty = Number(trx.qty) || 0;
const total = Number(trx.total) || 0;

omzet += total;
item += qty;

if(menuData[trx.menu]){
const [m,j]=menuData[trx.menu];
profit += (j-m)*qty;
}

const d = toLocalDate(trx.tanggal);

grafikOmzet[d]=(grafikOmzet[d]||0)+total;

if(menuData[trx.menu]){
const [m,j]=menuData[trx.menu];
grafikProfit[d]=(grafikProfit[d]||0)+((j-m)*qty);
}

});

document.getElementById('omzet').innerText = rupiah(omzet);
document.getElementById('trx').innerText = data.length;
document.getElementById('profit').innerText = rupiah(profit);
document.getElementById('item').innerText = item;

// CHART
if(chart) chart.destroy();

chart = new Chart(document.getElementById('chart'),{
type:'line',
data:{
labels:Object.keys(grafikOmzet),
datasets:[
{
label:'Omzet',
data:Object.values(grafikOmzet),
borderWidth:3
},
{
label:'Laba',
data:Object.values(grafikProfit),
borderWidth:3
}
]
}
});

}

// LOAD
async function load(){
try{
const res = await fetch(API_URL + "?t=" + Date.now());
transaksi = await res.json();
render();
}catch(e){
console.log(e);
}
}

load();
setInterval(load,5000);

</script>

</body>
</html>
