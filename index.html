<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<!-- MOBILE & IPHONE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>WARKOP SELSU & ZAMORE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

html,body{
width:100%;
overflow-x:hidden;
-webkit-text-size-adjust:100%;
}

body{
background:#f5f6fa;
display:flex;
color:#222;
}

/* ================= SIDEBAR ================= */

.sidebar{
width:240px;
background:#fff;
height:100vh;
padding:20px;
border-right:1px solid #eee;
position:fixed;
z-index:100;
box-shadow:0 0 20px rgba(0,0,0,0.05);
}

.logo{
font-size:24px;
font-weight:bold;
color:#e63946;
margin-bottom:30px;
line-height:1.3;
}

.menu button{
display:block;
width:100%;
margin-bottom:12px;
padding:14px;
border:none;
border-radius:14px;
background:#f5f5f5;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.menu button:hover{
transform:translateY(-2px);
}

.menu button.active{
background:linear-gradient(45deg,#ef4444,#dc2626);
color:white;
box-shadow:0 6px 15px rgba(239,68,68,0.3);
}

/* ================= MAIN ================= */

.main{
margin-left:260px;
padding:20px;
width:100%;
max-width:100%;
overflow-x:hidden;
}

/* ================= MODERN TOPBAR ================= */

.hero{
position:relative;
width:100%;
border-radius:28px;
overflow:hidden;
margin-bottom:25px;
background:#8b0000;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(
rgba(0,0,0,0.1),
rgba(0,0,0,0.3)
);
z-index:1;
}

.hero-content{
position:relative;
z-index:2;
padding:25px;
text-align:center;
}

.hero-content img{
width:100%;
max-width:850px;
margin:auto;
display:block;
object-fit:contain;
filter:drop-shadow(0 5px 12px rgba(0,0,0,0.3));
}

.hero-text{
margin-top:18px;
}

.hero-text h1{
font-size:32px;
color:white;
margin-bottom:8px;
letter-spacing:1px;
}

.hero-text p{
font-size:15px;
color:rgba(255,255,255,0.85);
}

/* ================= TOPBAR ================= */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:12px;
}

.topbar h2{
font-size:28px;
font-weight:700;
}

/* ================= FILTER ================= */

.filter{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filter button,
.filter input{
padding:12px 15px;
border:none;
border-radius:14px;
cursor:pointer;
background:#fff;
border:1px solid #ddd;
font-weight:600;
transition:0.2s;
}

.filter button:hover{
transform:translateY(-2px);
}

.filter button.active{
background:linear-gradient(45deg,#ef4444,#dc2626);
color:white;
border:none;
}

/* ================= CARDS ================= */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-bottom:25px;
}

.card{
padding:22px;
border-radius:24px;
color:white;
position:relative;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-4px);
}

.card::after{
content:'';
position:absolute;
width:120px;
height:120px;
background:rgba(255,255,255,0.08);
border-radius:50%;
top:-30px;
right:-30px;
}

.card h3{
font-size:15px;
margin-bottom:10px;
font-weight:500;
}

.card h1{
font-size:30px;
font-weight:bold;
}

.red{
background:linear-gradient(45deg,#ef4444,#dc2626);
}

.dark{
background:linear-gradient(45deg,#222,#444);
}

.green{
background:linear-gradient(45deg,#10b981,#059669);
}

.blue{
background:linear-gradient(45deg,#06b6d4,#0ea5e9);
}

/* ================= CHART ================= */

.chart-box{
background:white;
padding:25px;
border-radius:28px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
overflow:hidden;
}

.chart-box h3{
margin-bottom:20px;
font-size:18px;
}

/* ================= MOBILE ================= */

@media(max-width:900px){

body{
display:block;
}

.sidebar{
width:100%;
height:auto;
position:relative;
border-right:none;
border-bottom:1px solid #eee;
padding:18px;
}

.logo{
text-align:center;
margin-bottom:18px;
}

.menu{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.menu button{
width:auto;
padding:12px 18px;
margin:0;
}

.main{
margin-left:0;
padding:15px;
}

.hero{
border-radius:22px;
}

.hero-content{
padding:18px;
}

.hero-text h1{
font-size:24px;
}

.hero-text p{
font-size:13px;
}

.topbar{
flex-direction:column;
align-items:flex-start;
}

.topbar h2{
font-size:24px;
}

.filter{
width:100%;
}

.filter button,
.filter input{
flex:1;
min-width:120px;
font-size:14px;
}

.card h1{
font-size:24px;
}

.chart-box{
padding:18px;
border-radius:22px;
}

}

/* ================= SMALL PHONE ================= */

@media(max-width:480px){

.cards{
grid-template-columns:1fr;
}

.hero-text h1{
font-size:20px;
}

.hero-text p{
font-size:12px;
}

.filter{
display:grid;
grid-template-columns:1fr 1fr;
width:100%;
}

.filter input{
grid-column:span 2;
}

}

/* ================= IOS SAFARI FIX ================= */

canvas{
max-width:100% !important;
height:auto !important;
display:block;
}

img{
max-width:100%;
height:auto;
display:block;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
WARKOP SELSU & ZAMORE
</div>

<div class="menu">
<button class="active">Dashboard</button>
<button onclick="location.href='kasir.html'">Kasir</button>
<button onclick="location.href='laporan.html'">Laporan</button>
</div>

</div>

<div class="main">

<!-- HERO -->
<div class="hero">

<div class="hero-overlay"></div>

<div class="hero-content">

<img src="logo-warkop.png" alt="Logo Warkop">

<div class="hero-text">
<h1>Dashboard Kas Modern</h1>
<p>Selamat Sukses • POS Warkop Premium</p>
</div>

</div>

</div>

<div class="topbar">

<h2>Dashboard</h2>

<div class="filter">
<button onclick="setFilter('daily')" id="btnDaily" class="active">Daily</button>

<button onclick="setFilter('weekly')" id="btnWeekly">Weekly</button>

<button onclick="setFilter('monthly')" id="btnMonthly">Monthly</button>

<input type="date" onchange="filterTanggal(this.value)">

<button onclick="resetFilter()">Reset</button>
</div>

</div>

<div class="cards">

<div class="card red">
<h3>Pendapatan</h3>
<h1 id="omzet">Rp0</h1>
</div>

<div class="card dark">
<h3>Total Transaksi</h3>
<h1 id="trx">0</h1>
</div>

<div class="card green">
<h3>Laba Bersih</h3>
<h1 id="profit">Rp0</h1>
</div>

<div class="card blue">
<h3>Total Item</h3>
<h1 id="item">0</h1>
</div>

</div>

<div class="chart-box">
<h3>Trend Omzet vs Laba</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyB0_f8z2BV5szaA3tnEmwAD9UqjdU0A5d8TAVg-SuXTIoiGH7Y4yzfa99roTzpYS81/exec";

let transaksi = [];
let currentFilter = 'daily';
let selectedDate = null;
let chart;

// 🔥 FULL MENU DATA (LENGKAP)
const menuData = {
"Nasi Telor Crispy":[6500,12000],
"Nasi Goreng Kampung":[7500,15000],
"Nasi Goreng Kecap":[7500,15000],
"Rice Bowl":[8500,15000],
"Snack Platter":[8500,15000],
"Mie Nyemek Bangladesh":[9000,15000],
"Mie Nyemek Jogja":[9000,15000],
"Mie Rebus Telor":[6500,12000],
"Mie Goreng Telor":[6500,12000],
"Kentang Goreng":[5000,10000],
"Bakso Goreng":[5000,10000],
"Cireng Rujak":[4500,10000],
"Mini Bakpao":[3500,10000],
"Roti Bakar Coklat":[5500,10000],
"Roti Bakar Keju":[5500,10000],
"Roti Bakar Coklat Keju":[5500,10000],
"Otak - Otak":[3000,10000],
"Nasi":[2000,4000],
"Air Mineral":[1500,5000],
"Good Day Freeze":[3000,7000],
"Good Day Cappucino":[3000,7000],
"ABC Klepon":[3000,7000],
"Bonteh Teh Tarik":[3000,7000],
"Bonteh Matcha":[3000,7000],
"Chocolatos Coklat":[3000,8000],
"Chocolatos Matcha":[3000,8000],
"Drink Beng Beng":[3000,8000],
"Hilo Banana":[2500,8000],
"Hilo Hazelnut":[2500,8000],
"Nutrisari Jeruk":[2000,6000],
"Nutrisari Leci":[2000,6000],
"Josu":[2500,7000],
"Luwak":[2000,7000],
"Indocafe":[2000,7000],
"Creamy Latte":[2000,7000],
"Nescafe":[2000,6000],
"Susu Coklat":[2500,7000],
"Susu Putih":[2500,7000],
"Kapal Api (Hot)":[2500,5000],
"ABC Susu":[2500,5000],
"Minuman All (Hot)":[2500,5000],
"Pisang Nugget isi 4":[5500,10000],
"Pisang Nugget isi 6":[8500,15000],
"Basic Cookies":[1500,5000],
"Cookies Cadbury":[5000,10000],
"Ice cream":[5000,10000],
"Cookies S'Mores":[5000,10000],
"Cookies Cheese":[5000,10000],
"Lotus Biscoff":[7000,12000],
"Brownbites":[8500,15000],
"Brownies Lumer":[8500,15000],
"Brownies Chruncy":[8500,15000],
"Brownies Cream Cheese":[10000,15000],
"Dessert Platter":[10000,15000]
};

function rupiah(n){
return 'Rp' + Number(n).toLocaleString('id-ID');
}

// 🔥 FIX TIMEZONE
function toLocalDate(d){
return new Date(d).toLocaleDateString('id-ID');
}

// FILTER
function setFilter(f){
selectedDate = null;
currentFilter = f;

document.querySelectorAll('.filter button')
.forEach(b=>b.classList.remove('active'));

document.getElementById(
f==='daily'?'btnDaily':
f==='weekly'?'btnWeekly':'btnMonthly'
).classList.add('active');

render();
}

function filterTanggal(d){
selectedDate = d;
render();
}

function resetFilter(){
selectedDate=null;
render();
}

function getFiltered(){

if(selectedDate){
return transaksi.filter(t=>{
return new Date(t.tanggal)
.toISOString().split('T')[0] === selectedDate;
});
}

const now = new Date();

return transaksi.filter(t=>{
const d = new Date(t.tanggal);

if(currentFilter==='daily'){
return toLocalDate(d) === toLocalDate(now);
}

if(currentFilter==='weekly'){
let w = new Date();
w.setDate(now.getDate()-7);
return d >= w;
}

if(currentFilter==='monthly'){
return d.getMonth() === now.getMonth();
}
});
}

// RENDER
function render(){

const data = getFiltered();

let omzet=0, item=0, profit=0;
const grafikOmzet={}, grafikProfit={};

data.forEach(trx=>{

const qty = Number(trx.qty) || 0;
const total = Number(trx.total) || 0;

omzet += total;
item += qty;

if(menuData[trx.menu]){
const [m,j]=menuData[trx.menu];
profit += (j-m)*qty;
}

const d = toLocalDate(trx.tanggal);

grafikOmzet[d]=(grafikOmzet[d]||0)+total;

if(menuData[trx.menu]){
const [m,j]=menuData[trx.menu];
grafikProfit[d]=(grafikProfit[d]||0)+((j-m)*qty);
}

});

document.getElementById('omzet').innerText = rupiah(omzet);
document.getElementById('trx').innerText = data.length;
document.getElementById('profit').innerText = rupiah(profit);
document.getElementById('item').innerText = item;

// CHART
if(chart) chart.destroy();

chart = new Chart(document.getElementById('chart'),{
type:'line',
data:{
labels:Object.keys(grafikOmzet),
datasets:[
{
label:'Omzet',
data:Object.values(grafikOmzet),
borderWidth:3
},
{
label:'Laba',
data:Object.values(grafikProfit),
borderWidth:3
}
]
}
});

}

// LOAD
async function load(){
try{
const res = await fetch(API_URL + "?t=" + Date.now());
transaksi = await res.json();
render();
}catch(e){
console.log(e);
}
}

load();
setInterval(load,5000);

</script>

</body>
</html>
