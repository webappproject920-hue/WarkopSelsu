<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Warkop SelSu & Zamore</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f5f6fa;display:flex;color:#222;}

.sidebar{
width:240px;background:#fff;height:100vh;
padding:20px;border-right:1px solid #eee;
position:fixed;
}

.logo{
font-size:26px;font-weight:bold;
color:#4f46e5;margin-bottom:30px;
}

.menu button{
display:block;width:100%;margin-bottom:10px;
padding:12px;border:none;border-radius:10px;
background:#f1f1f1;cursor:pointer;
}

.menu button.active{
background:#4f46e5;color:white;
}

.main{
margin-left:260px;padding:20px;width:100%;
}

.topbar{
display:flex;justify-content:space-between;
margin-bottom:20px;flex-wrap:wrap;gap:10px;
}

.filter{
display:flex;gap:10px;flex-wrap:wrap;
}

.filter button,
.filter input{
padding:10px 14px;border:none;
border-radius:10px;cursor:pointer;
background:#fff;border:1px solid #ddd;
}

.filter button.active{
background:#4f46e5;color:white;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;margin-bottom:20px;
}

.card{
padding:20px;border-radius:18px;color:white;
}

.card h3{font-size:14px;margin-bottom:8px;}
.card h1{font-size:24px;}

.purple{background:linear-gradient(45deg,#6366f1,#4f46e5);}
.blue{background:linear-gradient(45deg,#06b6d4,#0ea5e9);}
.green{background:linear-gradient(45deg,#10b981,#059669);}
.red{background:linear-gradient(45deg,#ef4444,#dc2626);}

.chart-box{
background:white;padding:20px;border-radius:20px;
margin-bottom:20px;
}

#topProfitMenu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
margin-top:10px;
}

.top-item{
background:#f9fafb;
padding:12px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">Warkop Selsu & Zamore</div>

<div class="menu">
<button class="active">Dashboard</button>
<button onclick="location.href='kasir.html'">Kasir</button>
<button onclick="location.href='laporan.html'">Laporan</button>
</div>
</div>

<div class="main">

<div class="topbar">

<h2>Dashboard</h2>

<div class="filter">
<button onclick="setFilter('daily')" id="btnDaily" class="active">Daily</button>
<button onclick="setFilter('weekly')" id="btnWeekly">Weekly</button>
<button onclick="setFilter('monthly')" id="btnMonthly">Monthly</button>

<input type="date" onchange="filterTanggal(this.value)">
<button onclick="resetFilter()">Reset</button>
</div>

</div>

<div class="cards">

<div class="card purple">
<h3>Pendapatan</h3>
<h1 id="omzet">Rp0</h1>
</div>

<div class="card blue">
<h3>Total Transaksi</h3>
<h1 id="trx">0</h1>
</div>

<div class="card green">
<h3>Laba Bersih</h3>
<h1 id="profit">Rp0</h1>
<p id="profitCompare"></p>
</div>

<div class="card red">
<h3>Total Item</h3>
<h1 id="item">0</h1>
</div>

</div>

<div class="chart-box">
<h3>Trend Omzet</h3>
<canvas id="chart"></canvas>
</div>

<div class="chart-box">
<h3>Trend Laba Bersih</h3>
<canvas id="profitChart"></canvas>
</div>

<div class="chart-box">
<h3>Menu Paling Cuan</h3>
<div id="topProfitMenu"></div>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyB0_f8z2BV5szaA3tnEmwAD9UqjdU0A5d8TAVg-SuXTIoiGH7Y4yzfa99roTzpYS81/exec";

let transaksi = [];
let currentFilter = 'daily';
let selectedDate = null;
let chart, profitChart;

const menuData = {
"Nasi Telor Crispy":[6500,12000],
"Nasi Goreng Kampung":[7500,15000],
"Nasi Goreng Kecap":[7500,15000],
"Rice Bowl":[8500,15000],
"Snack Platter":[8500,15000],
"Mie Nyemek Bangladesh":[9000,15000],
"Mie Nyemek Jogja":[9000,15000],
"Mie Rebus Telor":[6500,12000],
"Mie Goreng Telor":[6500,12000],
"Kentang Goreng":[5000,10000],
"Bakso Goreng":[5000,10000],
"Cireng Rujak":[4500,10000],
"Mini Bakpao":[3500,10000],
"Roti Bakar Coklat":[5500,10000],
"Roti Bakar Keju":[5500,10000],
"Roti Bakar Coklat Keju":[5500,10000],
"Otak - Otak":[3000,10000],
"Nasi":[2000,4000],
"Air Mineral":[1500,5000],
"Good Day Freeze":[3000,7000],
"Good Day Cappucino":[3000,7000],
"ABC Klepon":[3000,7000],
"Bonteh Teh Tarik":[3000,7000],
"Bonteh Matcha":[3000,7000],
"Chocolatos Coklat":[3000,8000],
"Chocolatos Matcha":[3000,8000],
"Drink Beng Beng":[3000,8000],
"Hilo Banana":[2500,8000],
"Hilo Hazelnut":[2500,8000],
"Nutrisari Jeruk":[2000,6000],
"Nutrisari Leci":[2000,6000],
"Josu":[2500,6000],
"Luwak":[2000,7000],
"Indocafe":[2000,7000],
"Creamy Latte":[2000,7000],
"Nescafe":[2000,6000],
"Susu Coklat":[2500,7000],
"Susu Putih":[2500,7000],
"Wedang Bajigur":[2500,7000],
"Kapal Api (Hot)":[2500,5000],
"ABC Susu":[2500,5000],
"Minuman All (Hot)":[2500,5000],
"Pisang Nugget isi 4":[5500,10000],
"Pisang Nugget isi 6":[8500,15000],
"Basic Cookies":[1500,5000],
"Cookies Cadbury":[5000,10000],
"Cookies S'Mores":[5000,10000],
"Cookies Cheese":[5000,10000],
"Lotus Biscoff":[7000,12000],
"Brownbites":[8500,15000],
"Brownies Lumer":[8500,15000],
"Brownies Chruncy":[8500,15000],
"Brownies Cream Cheese":[10000,15000],
"Dessert Platter":[10000,15000]
};

// ✅ FIX DATE PARSER
function parseTanggal(str){
if(!str) return new Date();

if(str.includes('/')){
const parts = str.split(' ')[0].split('/');
return new Date(parts[2], parts[1]-1, parts[0]);
}

return new Date(str);
}

function rupiah(n){
return 'Rp' + Number(n).toLocaleString('id-ID');
}

function setFilter(f){
selectedDate=null;
currentFilter=f;

document.querySelectorAll('.filter button')
.forEach(b=>b.classList.remove('active'));

document.getElementById(
f==='daily'?'btnDaily':
f==='weekly'?'btnWeekly':'btnMonthly'
).classList.add('active');

render();
}

function filterTanggal(d){
selectedDate=d;
render();
}

function resetFilter(){
selectedDate=null;
render();
}

function getFilteredData(){

if(selectedDate){
return transaksi.filter(t=>{
const d = parseTanggal(t.tanggal);
const iso = d.getFullYear() + '-' +
String(d.getMonth()+1).padStart(2,'0') + '-' +
String(d.getDate()).padStart(2,'0');

return iso === selectedDate;
});
}

const now=new Date();

return transaksi.filter(t=>{
const d=parseTanggal(t.tanggal);

if(currentFilter==='daily')
return d.toDateString()===now.toDateString();

if(currentFilter==='weekly'){
const w=new Date();
w.setDate(now.getDate()-7);
return d>=w;
}

if(currentFilter==='monthly')
return d.getMonth()===now.getMonth();

});
}

function render(){

const data=getFilteredData();

let omzet=0,item=0,profit=0;
const grafik={},grafikProfit={},profitMenu={};

data.forEach(trx=>{

const qty=Number(trx.qty)||0;
const total=Number(trx.total)||0;

omzet+=total;
item+=qty;

let p=0;

if(menuData[trx.menu]){
const [m,j]=menuData[trx.menu];
p=(j-m)*qty;
profit+=p;
profitMenu[trx.menu]=(profitMenu[trx.menu]||0)+p;
}

const d=parseTanggal(trx.tanggal)
.toLocaleDateString('id-ID');

grafik[d]=(grafik[d]||0)+total;
grafikProfit[d]=(grafikProfit[d]||0)+p;

});

document.getElementById('omzet').innerText=rupiah(omzet);
document.getElementById('trx').innerText=data.length;
document.getElementById('profit').innerText=rupiah(profit);
document.getElementById('item').innerText=item;

// compare kemarin
const y=new Date(); y.setDate(y.getDate()-1);

let yProfit=0;

transaksi.forEach(t=>{
if(parseTanggal(t.tanggal).toDateString()===y.toDateString()){
const qty=Number(t.qty)||0;
if(menuData[t.menu]){
const [m,j]=menuData[t.menu];
yProfit+=(j-m)*qty;
}
}
});

let percent=yProfit>0?((profit-yProfit)/yProfit*100):0;

document.getElementById('profitCompare').innerHTML=
`${percent>=0?'▲':'▼'} ${Math.abs(percent).toFixed(1)}% vs kemarin`;

if(chart) chart.destroy();

chart=new Chart(document.getElementById('chart'),{
type:'line',
data:{labels:Object.keys(grafik),
datasets:[{data:Object.values(grafik),borderWidth:3,tension:.4}]}
});

if(profitChart) profitChart.destroy();

profitChart=new Chart(document.getElementById('profitChart'),{
type:'line',
data:{labels:Object.keys(grafikProfit),
datasets:[{data:Object.values(grafikProfit),borderWidth:3,tension:.4}]}
});

const top=Object.entries(profitMenu)
.sort((a,b)=>b[1]-a[1]).slice(0,5);

const div=document.getElementById('topProfitMenu');
div.innerHTML="";

top.forEach(i=>{
div.innerHTML+=`
<div class="top-item">
<b>${i[0]}</b><br>${rupiah(i[1])}
</div>`;
});

}

async function load(){
try{
const res=await fetch(API_URL+"?t="+Date.now());
transaksi=await res.json();
render();
}catch(e){console.log(e);}
}

load();
setInterval(load,5000);

</script>

</body>
</html>
