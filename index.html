<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Warkop SelSu & Zamore</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f5f6fa;display:flex;color:#222;}

.sidebar{
width:240px;background:#fff;height:100vh;
padding:20px;border-right:1px solid #eee;
position:fixed;
}

.logo{
font-size:26px;font-weight:bold;
color:#4f46e5;margin-bottom:30px;
}

.menu button{
display:block;width:100%;margin-bottom:10px;
padding:12px;border:none;border-radius:10px;
background:#f1f1f1;cursor:pointer;
}

.menu button.active{
background:#4f46e5;color:white;
}

.main{
margin-left:260px;padding:20px;width:100%;
}

.topbar{
display:flex;justify-content:space-between;
margin-bottom:20px;flex-wrap:wrap;gap:10px;
}

.filter{
display:flex;gap:10px;flex-wrap:wrap;
}

.filter button,
.filter input{
padding:10px 14px;border:none;
border-radius:10px;cursor:pointer;
background:#fff;border:1px solid #ddd;
}

.filter button.active{
background:#4f46e5;color:white;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;margin-bottom:20px;
}

.card{
padding:20px;border-radius:18px;color:white;
}

.card h3{font-size:14px;margin-bottom:8px;}
.card h1{font-size:24px;}

.purple{background:linear-gradient(45deg,#6366f1,#4f46e5);}
.blue{background:linear-gradient(45deg,#06b6d4,#0ea5e9);}
.green{background:linear-gradient(45deg,#10b981,#059669);}
.red{background:linear-gradient(45deg,#ef4444,#dc2626);}

.chart-box{
background:white;padding:20px;border-radius:20px;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">Warkop Selsu & Zamore</div>

<div class="menu">
<button class="active">Dashboard</button>
<button onclick="location.href='kasir.html'">Kasir</button>
<button onclick="location.href='laporan.html'">Laporan</button>
</div>
</div>

<div class="main">

<div class="topbar">

<h2>Dashboard</h2>

<div class="filter">
<button onclick="setFilter('daily')" id="btnDaily" class="active">Daily</button>
<button onclick="setFilter('weekly')" id="btnWeekly">Weekly</button>
<button onclick="setFilter('monthly')" id="btnMonthly">Monthly</button>

<input type="date" onchange="filterTanggal(this.value)">
<button onclick="resetFilter()">Reset</button>
</div>

</div>

<div class="cards">

<div class="card purple">
<h3>Pendapatan</h3>
<h1 id="omzet">Rp0</h1>
<p id="omzetCompare"></p>
</div>

<div class="card blue">
<h3>Total Transaksi</h3>
<h1 id="trx">0</h1>
</div>

<div class="card green">
<h3>Laba Bersih</h3>
<h1 id="profit">Rp0</h1>
<p id="profitCompare"></p>
</div>

<div class="card red">
<h3>Total Item</h3>
<h1 id="item">0</h1>
</div>

</div>

<div class="chart-box">
<h3>Trend Penjualan</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyB0_f8z2BV5szaA3tnEmwAD9UqjdU0A5d8TAVg-SuXTIoiGH7Y4yzfa99roTzpYS81/exec";

let transaksi = [];
let currentFilter = 'daily';
let selectedDate = null;
let chart;

// mapping modal & harga jual
const menuData = {
"Nasi Telor Crispy":[6500,12000],
"Nasi Goreng Kampung":[7500,15000],
"Nasi Goreng Kecap":[7500,15000],
"Rice Bowl":[8500,15000],
"Mie Goreng Telor":[6500,12000],
"Kentang Goreng":[5000,10000],
"Air Mineral":[1500,5000],
"Nutrisari Jeruk":[2000,6000],
"Brownbites":[8500,15000]
};

function rupiah(n){
return 'Rp' + Number(n).toLocaleString('id-ID');
}

// FILTER
function setFilter(f){
selectedDate = null;
currentFilter = f;

document.querySelectorAll('.filter button')
.forEach(btn=>btn.classList.remove('active'));

document.getElementById(
f==='daily'?'btnDaily':
f==='weekly'?'btnWeekly':'btnMonthly'
).classList.add('active');

render();
}

function filterTanggal(date){
selectedDate = date;
render();
}

function resetFilter(){
selectedDate = null;
render();
}

function getFilteredData(){

if(selectedDate){
return transaksi.filter(trx=>{
const d = new Date(trx.tanggal).toISOString().split('T')[0];
return d === selectedDate;
});
}

const now = new Date();

return transaksi.filter(trx=>{

const t = new Date(trx.tanggal);

if(currentFilter==='daily'){
return t.toDateString() === now.toDateString();
}

if(currentFilter==='weekly'){
const w = new Date();
w.setDate(now.getDate()-7);
return t >= w;
}

if(currentFilter==='monthly'){
return t.getMonth() === now.getMonth();
}

});
}

// RENDER
function render(){

const data = getFilteredData();

let omzet=0, item=0, profit=0;

const grafik={};

data.forEach(trx=>{

const qty = Number(trx.qty) || 0;
const total = Number(trx.total) || 0;

omzet += total;
item += qty;

if(menuData[trx.menu]){
const [m,j] = menuData[trx.menu];
profit += (j-m)*qty;
}

const d = new Date(trx.tanggal)
.toLocaleDateString('id-ID');

grafik[d] = (grafik[d] || 0) + total;

});

// tampil
document.getElementById('omzet').innerText = rupiah(omzet);
document.getElementById('trx').innerText = data.length;
document.getElementById('profit').innerText = rupiah(profit);
document.getElementById('item').innerText = item;

// ===== BANDUNGAN KEMARIN =====
const yesterday = new Date();
yesterday.setDate(yesterday.getDate()-1);

const yData = transaksi.filter(t=>{
return new Date(t.tanggal).toDateString() === yesterday.toDateString();
});

let yProfit=0;

yData.forEach(trx=>{
if(menuData[trx.menu]){
const [m,j]=menuData[trx.menu];
yProfit += (j-m)*trx.qty;
}
});

let percent = yProfit>0 ? ((profit-yProfit)/yProfit*100) : 0;

document.getElementById('profitCompare').innerHTML =
`${percent>=0?'▲':'▼'} ${Math.abs(percent).toFixed(1)}% vs kemarin`;

// CHART
if(chart) chart.destroy();

chart = new Chart(document.getElementById('chart'),{
type:'line',
data:{
labels:Object.keys(grafik),
datasets:[{
data:Object.values(grafik),
borderWidth:3,
tension:0.4
}]
}
});

}

// LOAD
async function load(){
try{
const res = await fetch(API_URL + "?t=" + Date.now());
transaksi = await res.json();
render();
}catch(e){
console.log(e);
}
}

load();
setInterval(load,5000);

</script>

</body>
</html>
