<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laporan Warkop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f6fa;
display:flex;
color:#222;
}

.sidebar{
width:240px;
background:#fff;
height:100vh;
padding:20px;
border-right:1px solid #eee;
position:fixed;
}

.logo{
font-size:26px;
font-weight:bold;
color:#e63946;
margin-bottom:30px;
}

.menu button{
display:block;
width:100%;
margin-bottom:10px;
padding:12px;
border:none;
border-radius:10px;
background:#f1f1f1;
cursor:pointer;
}

.menu button.active{
background:#e63946;
color:white;
}

.main{
margin-left:260px;
padding:20px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.filter{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

.filter button,
.filter input{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
background:#fff;
border:1px solid #ddd;
}

.filter button.active{
background:#e63946;
color:white;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
padding:20px;
border-radius:18px;
color:white;
}

.card h3{
font-size:14px;
margin-bottom:8px;
}

.card h1{
font-size:24px;
}

.red{
background:linear-gradient(45deg,#ef4444,#dc2626);
}

.dark{
background:linear-gradient(45deg,#222,#444);
}

.green{
background:linear-gradient(45deg,#10b981,#059669);
}

.blue{
background:linear-gradient(45deg,#06b6d4,#0ea5e9);
}

.table-box{
background:white;
padding:20px;
border-radius:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

th{
background:#fafafa;
}

.cash{
font-weight:bold;
color:#222;
}

.qris{
font-weight:bold;
color:#e63946;
}

@media(max-width:900px){

.sidebar{
display:none;
}

.main{
margin-left:0;
}

}
</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
WARKOP SELSU & ZAMORE
</div>

<div class="menu">
<button onclick="location.href='index.html'">
Dashboard
</button>

<button onclick="location.href='kasir.html'">
Kasir
</button>

<button class="active">
Laporan
</button>
</div>

</div>

<div class="main">

<div class="topbar">

<h2>Laporan Penjualan</h2>

<div class="filter">

<button onclick="filterData('all')" class="active" id="allBtn">
Semua
</button>

<button onclick="filterData('Cash')" id="cashBtn">
Cash
</button>

<button onclick="filterData('QRIS')" id="qrisBtn">
QRIS
</button>

<input type="date" id="tanggalFilter" onchange="filterTanggal(this.value)">

<button onclick="resetFilter()">
Reset
</button>

</div>

</div>

<div class="cards">

<div class="card red">
<h3>Total Omzet</h3>
<h1 id="omzet">Rp0</h1>
</div>

<div class="card dark">
<h3>Total Transaksi</h3>
<h1 id="trx">0</h1>
</div>

<div class="card green">
<h3>Total Cash</h3>
<h1 id="cashTotal">Rp0</h1>
</div>

<div class="card blue">
<h3>Total QRIS</h3>
<h1 id="qrisTotal">Rp0</h1>
</div>

</div>

<div class="table-box">

<h3>Riwayat Transaksi</h3>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Menu</th>
<th>Qty</th>
<th>Metode</th>
<th>Total</th>
</tr>
</thead>

<tbody id="laporanBody"></tbody>

</table>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyB0_f8z2BV5szaA3tnEmwAD9UqjdU0A5d8TAVg-SuXTIoiGH7Y4yzfa99roTzpYS81/exec";

let transaksi = [];
let currentMetode = 'all';
let selectedDate = null;

const laporanBody =
document.getElementById('laporanBody');

function rupiah(n){
return 'Rp' + Number(n).toLocaleString('id-ID');
}

async function loadData(){

try{

const res =
await fetch(API_URL + "?t=" + Date.now());

transaksi =
await res.json();

applyFilters();

}catch(err){

console.log(err);

}

}

function renderLaporan(data){

laporanBody.innerHTML='';

let omzet=0;
let cash=0;
let qris=0;

data
.slice()
.sort((a,b)=>
new Date(b.tanggal) - new Date(a.tanggal)
)
.forEach(item=>{

const total =
Number(item.total) || 0;

const qty =
Number(item.qty) || 0;

omzet += total;

if(item.metode === 'Cash'){
cash += total;
}else{
qris += total;
}

laporanBody.innerHTML += `
<tr>

<td>
${new Date(item.tanggal)
.toLocaleString('id-ID')}
</td>

<td>${item.menu}</td>

<td>${qty}</td>

<td class="${
item.metode === 'Cash'
? 'cash'
: 'qris'
}">
${item.metode}
</td>

<td>${rupiah(total)}</td>

</tr>
`;

});

document.getElementById('omzet')
.innerText = rupiah(omzet);

document.getElementById('trx')
.innerText = data.length;

document.getElementById('cashTotal')
.innerText = rupiah(cash);

document.getElementById('qrisTotal')
.innerText = rupiah(qris);

}

function filterData(metode){

currentMetode = metode;

document
.querySelectorAll('.filter button')
.forEach(btn=>
btn.classList.remove('active')
);

if(metode==='all'){

document.getElementById('allBtn')
.classList.add('active');

}else if(metode==='Cash'){

document.getElementById('cashBtn')
.classList.add('active');

}else{

document.getElementById('qrisBtn')
.classList.add('active');

}

applyFilters();

}

function filterTanggal(tanggal){

selectedDate = tanggal;

applyFilters();

}

function resetFilter(){

selectedDate = null;
currentMetode = 'all';

document.getElementById('tanggalFilter').value='';

document
.querySelectorAll('.filter button')
.forEach(btn=>
btn.classList.remove('active')
);

document.getElementById('allBtn')
.classList.add('active');

renderLaporan(transaksi);

}

function applyFilters(){

let hasil = transaksi;

if(currentMetode !== 'all'){

hasil = hasil.filter(item =>
item.metode === currentMetode
);

}

if(selectedDate){

hasil = hasil.filter(item => {

const tgl =
new Date(item.tanggal)
.toISOString()
.split('T')[0];

return tgl === selectedDate;

});

}

renderLaporan(hasil);

}

loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
