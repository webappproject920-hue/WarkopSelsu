<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Warkop POS</title>  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f5f7;
      display: flex;
      min-height: 100vh;
      color: #222;
    }

    .sidebar {
      width: 230px;
      background: white;
      padding: 20px;
      border-right: 1px solid #eee;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #e63946;
      margin-bottom: 30px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu button {
      border: none;
      padding: 14px;
      border-radius: 12px;
      background: #f3f3f3;
      cursor: pointer;
      text-align: left;
      transition: 0.2s;
    }

    .menu button.active,
    .menu button:hover {
      background: #e63946;
      color: white;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-group {
      display: flex;
      gap: 10px;
    }

    .filter-group button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: white;
      border: 1px solid #ddd;
      cursor: pointer;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #666;
      font-size: 15px;
    }

    .card h1 {
      color: #e63946;
      font-size: 28px;
    }

    .table-box {
      background: white;
      border-radius: 20px;
      padding: 20px;
      overflow-x: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #fafafa;
    }

    .cash {
      color: #222;
      font-weight: bold;
    }

    .qris {
      color: #e63946;
      font-weight: bold;
    }

    .detail-item {
      margin-bottom: 6px;
      font-size: 13px;
    }

    @media(max-width:900px){
      .sidebar {
        display: none;
      }
    }
  </style></head>
<body>  <div class="sidebar">
    <div class="logo">Warkop POS</div><div class="menu">
  <button>Dashboard</button>
  <button>Kasir</button>
  <button>Produk</button>
  <button>Statistik</button>
  <button class="active">Laporan</button>
</div>

  </div>  <div class="main"><div class="topbar">
  <h1>Laporan Penjualan</h1>

  <div class="filter-group">
    <button onclick="filterData('all')">Semua</button>
    <button onclick="filterData('Cash')">Cash</button>
    <button onclick="filterData('QRIS')">QRIS</button>
  </div>
</div>

<div class="cards">
  <div class="card">
    <h3>Total Transaksi</h3>
    <h1 id="totalTransaksi">0</h1>
  </div>

  <div class="card">
    <h3>Total Omzet</h3>
    <h1 id="totalOmzet">Rp0</h1>
  </div>

  <div class="card">
    <h3>Pembayaran Cash</h3>
    <h1 id="cashTotal">Rp0</h1>
  </div>

  <div class="card">
    <h3>Pembayaran QRIS</h3>
    <h1 id="qrisTotal">Rp0</h1>
  </div>
</div>

<div class="table-box">
  <h2>Riwayat Transaksi</h2>

  <table>
    <thead>
      <tr>
        <th>Tanggal</th>
        <th>Metode</th>
        <th>Pesanan</th>
        <th>Total</th>
      </tr>
    </thead>

    <tbody id="laporanBody"></tbody>
  </table>
</div>

  </div>  <script>
    let transaksi = JSON.parse(localStorage.getItem('transaksi')) || [];

    const laporanBody = document.getElementById('laporanBody');

    function rupiah(angka){
      return 'Rp' + angka.toLocaleString('id-ID');
    }

    function renderLaporan(data){
      laporanBody.innerHTML = '';

      let omzet = 0;
      let cash = 0;
      let qris = 0;

      data.reverse().forEach(item => {

        let total = 0;
        let detail = '';

        item.items.forEach(menu => {
          const subtotal = menu.harga * menu.qty;
          total += subtotal;

          detail += `
            <div class="detail-item">
              ${menu.nama} x${menu.qty}
            </div>
          `;
        });

        omzet += total;

        if(item.metode === 'Cash'){
          cash += total;
        } else {
          qris += total;
        }

        laporanBody.innerHTML += `
          <tr>
            <td>${item.tanggal}</td>
            <td class="${item.metode === 'Cash' ? 'cash' : 'qris'}">
              ${item.metode}
            </td>
            <td>${detail}</td>
            <td>${rupiah(total)}</td>
          </tr>
        `;
      });

      document.getElementById('totalTransaksi').innerText = data.length;
      document.getElementById('totalOmzet').innerText = rupiah(omzet);
      document.getElementById('cashTotal').innerText = rupiah(cash);
      document.getElementById('qrisTotal').innerText = rupiah(qris);
    }

    renderLaporan([...transaksi]);

    function filterData(metode){
      if(metode === 'all'){
        renderLaporan([...transaksi]);
      } else {
        const hasil = transaksi.filter(item => item.metode === metode);
        renderLaporan([...hasil]);
      }
    }
  </script></body>
</html>
